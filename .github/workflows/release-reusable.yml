name: Reusable NPM Release

on:
  workflow_call:
    inputs:
      package_dir:
        description: Package directory that contains package.json
        required: true
        type: string
      dry_run:
        description: Run full release flow with npm publish --dry-run
        required: false
        default: true
        type: boolean
      ref:
        description: Git ref to checkout (branch, tag, or SHA). Empty means event ref.
        required: false
        default: ""
        type: string
      expected_tag:
        description: Optional expected tag value to match package version
        required: false
        default: ""
        type: string
      allow_tag_prefix_v:
        description: Allow v prefix in expected_tag (v1.2.3)
        required: false
        default: true
        type: boolean
      allow_tag_prefix_test_v:
        description: Allow test-v prefix in expected_tag (test-v1.2.3-test.1)
        required: false
        default: false
        type: boolean
      allow_non_main:
        description: Allow publish from commits not reachable from main_branch
        required: false
        default: false
        type: boolean
      main_branch:
        description: Branch used for ancestry guard
        required: false
        default: main
        type: string
      env_name:
        description: Protected environment name for real publish
        required: false
        default: npm-release
        type: string
      require_manual_confirm:
        description: Require confirm_publish and confirm_version checks for real publish
        required: false
        default: false
        type: boolean
      confirm_publish:
        description: Must be publish when require_manual_confirm=true and dry_run=false
        required: false
        default: ""
        type: string
      confirm_version:
        description: Must equal package version when require_manual_confirm=true and dry_run=false
        required: false
        default: ""
        type: string
      run_tests:
        description: Run pnpm test during preflight
        required: false
        default: true
        type: boolean
      publish_access:
        description: npm publish access value (public or restricted)
        required: false
        default: public
        type: string
    outputs:
      package_name:
        description: npm package name
        value: ${{ jobs.preflight.outputs.package_name }}
      version:
        description: resolved package version
        value: ${{ jobs.preflight.outputs.version }}
      release_channel:
        description: stable, beta, or test
        value: ${{ jobs.preflight.outputs.release_channel }}
      dist_tag:
        description: npm dist-tag (latest, beta, or test)
        value: ${{ jobs.preflight.outputs.dist_tag }}

permissions:
  contents: read

env:
  CI: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      version: ${{ steps.meta.outputs.version }}
      release_channel: ${{ steps.meta.outputs.release_channel }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      pack_path: ${{ steps.pack.outputs.pack_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.6.2
          npm --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Resolve release metadata and validate policy
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          PKG_JSON="${{ inputs.package_dir }}/package.json"
          if [[ ! -f "$PKG_JSON" ]]; then
            echo "Missing package.json at $PKG_JSON"
            exit 1
          fi

          PACKAGE_NAME=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));console.log(j.name||'');" "$PKG_JSON")
          VERSION=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));console.log(j.version||'');" "$PKG_JSON")

          if [[ -z "$PACKAGE_NAME" || -z "$VERSION" ]]; then
            echo "Failed to read package name/version from $PKG_JSON"
            exit 1
          fi

          RELEASE_CHANNEL=""
          DIST_TAG=""
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            RELEASE_CHANNEL="stable"
            DIST_TAG="latest"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            RELEASE_CHANNEL="beta"
            DIST_TAG="beta"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-test\.[0-9]+$ ]]; then
            RELEASE_CHANNEL="test"
            DIST_TAG="test"
          else
            echo "Unsupported version format: $VERSION"
            echo "Only stable x.y.z, beta x.y.z-beta.n, and test x.y.z-test.n are allowed."
            exit 1
          fi

          EXPECTED_TAG="${{ inputs.expected_tag }}"
          if [[ -n "$EXPECTED_TAG" ]]; then
            RAW_TAG="${EXPECTED_TAG#refs/tags/}"
            NORMALIZED_TAG="$RAW_TAG"
            if [[ "${{ inputs.allow_tag_prefix_v }}" == "true" && "$NORMALIZED_TAG" == v* ]]; then
              NORMALIZED_TAG="${NORMALIZED_TAG#v}"
            fi
            if [[ "${{ inputs.allow_tag_prefix_test_v }}" == "true" && "$NORMALIZED_TAG" == test-v* ]]; then
              NORMALIZED_TAG="${NORMALIZED_TAG#test-v}"
            fi
            if [[ "$NORMALIZED_TAG" != "$VERSION" ]]; then
              echo "Tag/version mismatch. tag=$EXPECTED_TAG normalized=$NORMALIZED_TAG version=$VERSION"
              exit 1
            fi
            if [[ "$RELEASE_CHANNEL" == "test" && "$RAW_TAG" != test-v* ]]; then
              echo "Test channel tag must start with test-v. received=$RAW_TAG"
              exit 1
            fi
            if [[ "$RELEASE_CHANNEL" != "test" && "$RAW_TAG" == test-v* ]]; then
              echo "test-v tags can only be used with test channel versions. version=$VERSION"
              exit 1
            fi
          fi

          if [[ "${{ inputs.dry_run }}" != "true" ]]; then
            if [[ "${{ inputs.require_manual_confirm }}" == "true" ]]; then
              if [[ "${{ inputs.confirm_publish }}" != "publish" ]]; then
                echo "confirm_publish must be exactly 'publish' for real release."
                exit 1
              fi
              if [[ -z "${{ inputs.confirm_version }}" ]]; then
                echo "confirm_version is required for real release."
                exit 1
              fi
              if [[ "${{ inputs.confirm_version }}" != "$VERSION" ]]; then
                echo "confirm_version mismatch. provided=${{ inputs.confirm_version }} actual=$VERSION"
                exit 1
              fi
            fi

            if [[ "${{ inputs.allow_non_main }}" != "true" ]]; then
              git fetch --no-tags origin "${{ inputs.main_branch }}" --depth=200
              if ! git merge-base --is-ancestor HEAD "origin/${{ inputs.main_branch }}"; then
                echo "Current commit is not reachable from origin/${{ inputs.main_branch }}"
                exit 1
              fi
            fi

            set +e
            npm view "${PACKAGE_NAME}@${VERSION}" version --registry "https://registry.npmjs.org" > /tmp/npm_view_out.txt 2> /tmp/npm_view_err.txt
            VIEW_STATUS=$?
            set -e
            if [[ $VIEW_STATUS -eq 0 ]]; then
              echo "Version already exists on npm: ${PACKAGE_NAME}@${VERSION}"
              exit 1
            fi
            if ! grep -Eq "E404|404 Not Found" /tmp/npm_view_err.txt; then
              echo "Unexpected npm view failure:"
              cat /tmp/npm_view_err.txt
              exit 1
            fi
          fi

          {
            echo "package_name=$PACKAGE_NAME"
            echo "version=$VERSION"
            echo "release_channel=$RELEASE_CHANNEL"
            echo "dist_tag=$DIST_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        if: ${{ inputs.run_tests }}
        run: pnpm test

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .release-artifacts
          pushd "${{ inputs.package_dir }}" >/dev/null
          npm pack --json --ignore-scripts > /tmp/npm_pack.json
          PACK_FILE=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('/tmp/npm_pack.json','utf8'));console.log((j[0]&&j[0].filename)||'');")
          popd >/dev/null

          if [[ -z "$PACK_FILE" ]]; then
            echo "Failed to resolve npm pack output file"
            exit 1
          fi

          mv "${{ inputs.package_dir }}/${PACK_FILE}" ".release-artifacts/${PACK_FILE}"
          echo "pack_path=.release-artifacts/${PACK_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-preview-${{ steps.meta.outputs.version }}
          path: ${{ steps.pack.outputs.pack_path }}
          retention-days: 7

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ inputs.package_dir }}"
          npm publish --dry-run --tag "${{ steps.meta.outputs.dist_tag }}" --access "${{ inputs.publish_access }}"

  publish:
    name: Publish To npm
    needs: preflight
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.6.2
          npm --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ inputs.package_dir }}"
          npm publish --tag "${{ needs.preflight.outputs.dist_tag }}" --access "${{ inputs.publish_access }}" --provenance
