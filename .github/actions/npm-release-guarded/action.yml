name: Guarded NPM Release
description: Validate version policy and run preflight, dry-run, or real npm publish with guardrails.

inputs:
  package_dir:
    description: Package directory containing package.json
    required: true
  publish_mode:
    description: preflight, dry-run, or publish
    required: false
    default: preflight
  expected_tag:
    description: Optional expected tag to match package version
    required: false
    default: ""
  allow_tag_prefix_v:
    description: Allow expected_tag values like v1.2.3
    required: false
    default: "true"
  allow_non_main:
    description: Allow publish from commits not reachable from main_branch
    required: false
    default: "false"
  main_branch:
    description: Branch used for ancestry guard
    required: false
    default: main
  require_manual_confirm:
    description: Require confirm_publish=publish and confirm_version=resolved_version when mode=publish
    required: false
    default: "false"
  confirm_publish:
    description: Manual confirmation token
    required: false
    default: ""
  confirm_version:
    description: Manual version confirmation value
    required: false
    default: ""
  run_tests:
    description: Run pnpm test
    required: false
    default: "true"
  check_version_exists:
    description: Check whether package version already exists in npm
    required: false
    default: "false"
  publish_access:
    description: npm publish access value (public or restricted)
    required: false
    default: public

outputs:
  package_name:
    description: npm package name
    value: ${{ steps.meta.outputs.package_name }}
  version:
    description: resolved version
    value: ${{ steps.meta.outputs.version }}
  release_channel:
    description: stable or beta
    value: ${{ steps.meta.outputs.release_channel }}
  dist_tag:
    description: latest or beta
    value: ${{ steps.meta.outputs.dist_tag }}
  pack_path:
    description: generated npm pack tarball path
    value: ${{ steps.pack.outputs.pack_path }}

runs:
  using: composite
  steps:
    - name: Resolve metadata and validate
      id: meta
      shell: bash
      run: |
        set -euo pipefail

        MODE="${{ inputs.publish_mode }}"
        if [[ "$MODE" != "preflight" && "$MODE" != "dry-run" && "$MODE" != "publish" ]]; then
          echo "Invalid publish_mode: $MODE"
          exit 1
        fi

        PKG_JSON="${{ inputs.package_dir }}/package.json"
        if [[ ! -f "$PKG_JSON" ]]; then
          echo "Missing package.json at $PKG_JSON"
          exit 1
        fi

        PACKAGE_NAME=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));console.log(j.name||'');" "$PKG_JSON")
        VERSION=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));console.log(j.version||'');" "$PKG_JSON")

        if [[ -z "$PACKAGE_NAME" || -z "$VERSION" ]]; then
          echo "Failed to resolve package name/version from $PKG_JSON"
          exit 1
        fi

        RELEASE_CHANNEL=""
        DIST_TAG=""
        if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          RELEASE_CHANNEL="stable"
          DIST_TAG="latest"
        elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
          RELEASE_CHANNEL="beta"
          DIST_TAG="beta"
        else
          echo "Unsupported version format: $VERSION"
          echo "Only stable x.y.z and beta x.y.z-beta.n are allowed."
          exit 1
        fi

        EXPECTED_TAG="${{ inputs.expected_tag }}"
        if [[ -n "$EXPECTED_TAG" ]]; then
          NORMALIZED_TAG="${EXPECTED_TAG#refs/tags/}"
          if [[ "${{ inputs.allow_tag_prefix_v }}" == "true" && "$NORMALIZED_TAG" == v* ]]; then
            NORMALIZED_TAG="${NORMALIZED_TAG#v}"
          fi
          if [[ "$NORMALIZED_TAG" != "$VERSION" ]]; then
            echo "Tag/version mismatch. tag=$EXPECTED_TAG normalized=$NORMALIZED_TAG version=$VERSION"
            exit 1
          fi
        fi

        if [[ "$MODE" == "publish" ]]; then
          if [[ "${{ inputs.require_manual_confirm }}" == "true" ]]; then
            if [[ "${{ inputs.confirm_publish }}" != "publish" ]]; then
              echo "confirm_publish must be exactly 'publish' when require_manual_confirm=true"
              exit 1
            fi
            if [[ -z "${{ inputs.confirm_version }}" || "${{ inputs.confirm_version }}" != "$VERSION" ]]; then
              echo "confirm_version must equal resolved version $VERSION"
              exit 1
            fi
          fi

          if [[ "${{ inputs.allow_non_main }}" != "true" ]]; then
            git fetch --no-tags origin "${{ inputs.main_branch }}" --depth=200
            if ! git merge-base --is-ancestor HEAD "origin/${{ inputs.main_branch }}"; then
              echo "Current commit is not reachable from origin/${{ inputs.main_branch }}"
              exit 1
            fi
          fi
        fi

        if [[ "${{ inputs.check_version_exists }}" == "true" ]]; then
          set +e
          npm view "${PACKAGE_NAME}@${VERSION}" version --registry "https://registry.npmjs.org" > /tmp/npm_view_out.txt 2> /tmp/npm_view_err.txt
          VIEW_STATUS=$?
          set -e
          if [[ $VIEW_STATUS -eq 0 ]]; then
            echo "Version already exists on npm: ${PACKAGE_NAME}@${VERSION}"
            exit 1
          fi
          if ! grep -Eq "E404|404 Not Found" /tmp/npm_view_err.txt; then
            echo "Unexpected npm view failure:"
            cat /tmp/npm_view_err.txt
            exit 1
          fi
        fi

        {
          echo "package_name=$PACKAGE_NAME"
          echo "version=$VERSION"
          echo "release_channel=$RELEASE_CHANNEL"
          echo "dist_tag=$DIST_TAG"
        } >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build
      shell: bash
      run: pnpm build

    - name: Test
      if: ${{ inputs.run_tests == 'true' }}
      shell: bash
      run: pnpm test

    - name: Pack npm tarball
      id: pack
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .release-artifacts
        pushd "${{ inputs.package_dir }}" >/dev/null
        npm pack --json --ignore-scripts > /tmp/npm_pack.json
        PACK_FILE=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('/tmp/npm_pack.json','utf8'));console.log((j[0]&&j[0].filename)||'');")
        popd >/dev/null

        if [[ -z "$PACK_FILE" ]]; then
          echo "Failed to resolve npm pack output file"
          exit 1
        fi

        mv "${{ inputs.package_dir }}/${PACK_FILE}" ".release-artifacts/${PACK_FILE}"
        echo "pack_path=.release-artifacts/${PACK_FILE}" >> "$GITHUB_OUTPUT"

    - name: Publish dry run
      if: ${{ inputs.publish_mode == 'dry-run' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.package_dir }}"
        npm publish --dry-run --tag "${{ steps.meta.outputs.dist_tag }}" --access "${{ inputs.publish_access }}"

    - name: Publish to npm
      if: ${{ inputs.publish_mode == 'publish' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.package_dir }}"
        npm publish --tag "${{ steps.meta.outputs.dist_tag }}" --access "${{ inputs.publish_access }}" --provenance
